<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Duty Roster</title>

<!-- PWA / Home screen support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Duty Roster" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#F7F4EC" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2320241F'/%3E%3Ctext x='50' y='62' font-size='42' font-family='Georgia,serif' font-weight='700' fill='%23F7F4EC' text-anchor='middle'%3E2B%3C/text%3E%3C/svg%3E" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2320241F'/%3E%3Ctext x='50' y='62' font-size='42' font-family='Georgia,serif' font-weight='700' fill='%23F7F4EC' text-anchor='middle'%3E2B%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #F7F4EC; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #20241F;
    padding: max(16px, env(safe-area-inset-top)) 14px calc(40px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }
  button { cursor: pointer; border: none; font-family: inherit; transition: transform .12s ease, opacity .12s ease; background: none; }
  button:active { transform: scale(0.96); }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #D8D2C4; border-radius: 4px; }

  /* Header */
  .header { display: flex; flex-direction: column; gap: 6px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .badge {
    font-family: 'Space Grotesk', sans-serif; font-size: 11px; letter-spacing: .08em;
    font-weight: 700; color: #2F6F5E; background: #E4EEE9; padding: 5px 10px; border-radius: 20px;
  }
  .export-btn {
    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; color: #fff;
    background: #20241F; padding: 8px 16px; border-radius: 10px;
  }
  #ownerName {
    font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: #20241F;
    border: none; background: transparent; outline: none; padding: 2px 0; width: 100%;
  }
  #ownerPhone {
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: #5B5648;
    border: none; background: transparent; outline: none; padding: 0; width: 100%;
  }
  #saveStatus { font-size: 11px; color: #2F6F5E; min-height: 14px; }

  /* Month nav */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between; background: #fff;
    border-radius: 14px; padding: 10px 16px; box-shadow: 0 1px 2px rgba(32,36,31,.06);
  }
  .nav-btn { font-size: 20px; color: #2F6F5E; background: #E4EEE9; width: 34px; height: 34px; border-radius: 10px; line-height: 1; }
  .month-label { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; }

  .quickfill-toggle {
    background: #fff; color: #2F6F5E; border: 1.5px solid #2F6F5E; border-radius: 10px;
    padding: 9px 12px; font-size: 12.5px; font-weight: 600; font-family: 'Space Grotesk', sans-serif; width: 100%;
  }
  .quickfill-toggle.active { background: #20241F; color: #fff; border-color: #20241F; }

  /* Weekday row */
  .weekday-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .weekday-cell { text-align: center; font-size: 11px; font-weight: 600; color: #8A8377; padding: 2px 0; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
  .empty-cell { min-height: 54px; }
  .day-cell {
    position: relative; min-height: 54px; background: #fff; border-radius: 10px;
    border: 1.5px solid #E5E0D3; padding: 5px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .day-cell.today { box-shadow: 0 0 0 2px #20241F inset; }
  .day-cell.quick-selected { background: #20241F; border-color: #20241F; }
  .day-cell:hover { outline: 2px solid #2F6F5E33; }
  .day-num { font-size: 12px; font-weight: 600; color: #5B5648; }
  .day-cell.quick-selected .day-num { color: #fff; }
  .day-shift-chip {
    font-size: 10px; font-weight: 700; color: #fff; border-radius: 6px; padding: 2px 4px;
    text-align: center; font-family: 'Space Grotesk', sans-serif;
  }
  .comment-dot { position: absolute; top: 5px; right: 5px; width: 6px; height: 6px; border-radius: 50%; background: #C48A2F; }
  .quick-checkmark {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #fff; font-size: 16px; font-weight: 700;
  }

  /* Summary */
  .summary { background: #fff; border-radius: 14px; padding: 12px 14px; box-shadow: 0 1px 2px rgba(32,36,31,.06); }
  .summary-title { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .summary-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .summary-chip { display: flex; align-items: center; gap: 5px; border: 1.5px solid; border-radius: 20px; padding: 4px 9px; font-size: 12px; }
  .summary-chip .count { color: #5B5648; font-weight: 600; }
  .empty-note { font-size: 12px; color: #8A8377; }

  /* Legend */
  .legend { display: flex; flex-direction: column; gap: 4px; background: #fff; border-radius: 14px; padding: 12px 14px; box-shadow: 0 1px 2px rgba(32,36,31,.06); }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 12px; color: #5B5648; }

  /* Overlay / sheets */
  .overlay {
    position: fixed; inset: 0; background: rgba(32,36,31,.45); display: none;
    align-items: flex-end; justify-content: center; z-index: 50;
  }
  .overlay.show { display: flex; }
  .sheet, .export-sheet {
    background: #F7F4EC; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0;
    padding: 10px 18px calc(24px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
  }
  .sheet { max-height: 85vh; overflow-y: auto; }
  .sheet-handle { width: 40px; height: 4px; border-radius: 4px; background: #D8D2C4; margin: 4px auto 6px; }
  .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .sheet-date { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
  .sheet-weekday { font-size: 12px; color: #8A8377; margin-top: 2px; }
  .close-btn { width: 30px; height: 30px; border-radius: 10px; background: #fff; color: #5B5648; font-size: 14px; }
  .sheet-label { font-size: 12px; font-weight: 600; color: #5B5648; margin-top: 6px; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .pick-chip {
    border: 1.5px solid; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif; background: #fff;
  }
  .pick-chip.selected { color: #fff !important; }
  #commentBox {
    width: 100%; border-radius: 10px; border: 1.5px solid #E5E0D3; padding: 10px 12px;
    font-size: 13px; resize: vertical; background: #fff; outline: none;
  }
  .sheet-actions { display: flex; gap: 8px; margin-top: 4px; }
  .save-comment-btn {
    flex: 1; background: #2F6F5E; color: #fff; border-radius: 10px; padding: 11px 0;
    font-size: 13px; font-weight: 700; font-family: 'Space Grotesk', sans-serif;
  }
  .clear-btn {
    background: #fff; color: #B5533C; border: 1.5px solid #B5533C; border-radius: 10px;
    padding: 11px 16px; font-size: 13px; font-weight: 700; font-family: 'Space Grotesk', sans-serif;
  }
  .export-desc { font-size: 13px; color: #5B5648; line-height: 1.5; }
  .export-confirm-btn {
    background: #20241F; color: #fff; border-radius: 10px; padding: 12px 0; font-size: 14px;
    font-weight: 700; font-family: 'Space Grotesk', sans-serif; margin-top: 4px;
  }
  .export-confirm-btn.secondary { background: #fff; color: #20241F; border: 1.5px solid #E5E0D3; margin-top: 0; }
  .export-confirm-btn.whatsapp { background: #25D366; margin-top: 0; }
  .cancel-btn { background: transparent; color: #8A8377; padding: 8px 0; font-size: 13px; font-weight: 600; }

  /* Quick fill bar */
  .quickfill-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: #F7F4EC; border-top: 1.5px solid #E5E0D3;
    padding: 14px 18px calc(20px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 16px rgba(32,36,31,.1);
    z-index: 40; max-width: 480px; margin: 0 auto; display: none;
  }
  .quickfill-bar.show { display: block; }
  .quickfill-bar-label { font-size: 12.5px; font-weight: 600; color: #5B5648; margin-bottom: 8px; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="badge">MOI · WARD 2B</div>
      <button class="export-btn" id="exportOpenBtn">Export</button>
    </div>
    <input id="ownerName" placeholder="Jina lako" />
    <input id="ownerPhone" placeholder="Namba ya simu (mf. 0742417963)" />
    <div id="saveStatus"></div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextMonth">›</button>
  </div>

  <button class="quickfill-toggle" id="quickfillToggle">Jaza tarehe nyingi mfululizo (Quick Fill)</button>

  <div class="weekday-row" id="weekdayRow"></div>
  <div class="grid" id="grid"></div>

  <div class="summary">
    <div class="summary-title">Muhtasari wa mwezi</div>
    <div class="summary-chips" id="summaryChips"></div>
  </div>

  <div class="legend" id="legend"></div>

  <!-- Quick fill floating bar -->
  <div class="quickfill-bar" id="quickfillBar">
    <div class="quickfill-bar-label" id="quickfillBarLabel"></div>
    <div class="chip-grid" id="quickfillChips"></div>
  </div>

  <!-- Day editor sheet -->
  <div class="overlay" id="daySheetOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <div class="sheet-date" id="sheetDate"></div>
          <div class="sheet-weekday" id="sheetWeekday"></div>
        </div>
        <button class="close-btn" id="closeDayBtn">✕</button>
      </div>
      <div class="sheet-label">Chagua shift</div>
      <div class="chip-grid" id="dayChips"></div>
      <div class="sheet-label">Comment / Kumbukumbu (mf. special call)</div>
      <textarea id="commentBox" rows="3" placeholder="Andika kumbukumbu hapa..."></textarea>
      <div class="sheet-actions">
        <button class="save-comment-btn" id="saveCommentBtn">Hifadhi na Funga</button>
        <button class="clear-btn" id="clearDayBtn">Futa siku hii</button>
      </div>
    </div>
  </div>

  <!-- Export modal -->
  <div class="overlay" id="exportOverlay">
    <div class="export-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-date" id="exportTitle"></div>
      <div class="export-desc">Chagua aina ya faili unayotaka kupakua. Unaweza pia kutuma moja kwa moja WhatsApp.</div>
      <button class="export-confirm-btn" id="exportXlsxBtn">📊 Pakua Excel (.xlsx)</button>
      <button class="export-confirm-btn secondary" id="exportCsvBtn">Pakua CSV</button>
      <button class="export-confirm-btn whatsapp" id="exportShareBtn">💬 Share kwenye WhatsApp</button>
      <button class="cancel-btn" id="exportCancelBtn">Ghairi</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var SHIFT_CODES = [
    { code: "7-5", label: "7-5", desc: "Kazi 01:00 - 23:00 (full day)", color: "#2F6F5E" },
    { code: "N", label: "N", desc: "Night shift", color: "#233A66" },
    { code: "SD", label: "SD", desc: "Sleeping Day", color: "#6B4E8E" },
    { code: "DO", label: "DO", desc: "Day Off", color: "#8A8377" },
    { code: "L", label: "L", desc: "Leave (likizo)", color: "#B5533C" },
    { code: "PH", label: "PH", desc: "Public Holiday", color: "#C48A2F" },
    { code: "DYS", label: "DYS", desc: "Special/Emergency leave (idadi ya siku)", color: "#A33F5A" }
  ];
  var CODE_MAP = {};
  SHIFT_CODES.forEach(function (s) { CODE_MAP[s.code] = s; });

  var MONTH_NAMES_SW = ["Januari","Februari","Machi","Aprili","Mei","Juni","Julai","Agosti","Septemba","Oktoba","Novemba","Desemba"];
  var WEEKDAYS_SW = ["Jumapili","Jumatatu","Jumanne","Jumatano","Alhamisi","Ijumaa","Jumamosi"];
  var WEEKDAYS_SHORT = ["J2","J3","J4","J5","Al","Ij","J1"];

  var STORAGE_KEY = "duty_roster_entries_v1";
  var NAME_KEY = "duty_roster_owner_name_v1";

  function pad(n) { return String(n).padStart(2, "0"); }
  function dateKey(y, m, d) { return y + "-" + pad(m + 1) + "-" + pad(d); }
  function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  }
  function saveEntries(entries) {
    var status = document.getElementById("saveStatus");
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      status.textContent = "Imehifadhiwa ✓";
    } catch (e) {
      status.textContent = "Imeshindikana kuhifadhi";
    }
    setTimeout(function () { status.textContent = ""; }, 1500);
  }

  var today = new Date();
  var state = {
    year: 2026,
    month: 6, // July, 0-indexed
    entries: loadEntries(),
    selectedDay: null,
    quickFillMode: false,
    quickFillDays: []
  };

  var ownerInput = document.getElementById("ownerName");
  ownerInput.value = localStorage.getItem(NAME_KEY) || "";
  ownerInput.addEventListener("input", function () {
    localStorage.setItem(NAME_KEY, ownerInput.value);
  });

  var PHONE_KEY = "duty_roster_owner_phone_v1";
  var phoneInput = document.getElementById("ownerPhone");
  phoneInput.value = localStorage.getItem(PHONE_KEY) || "";
  phoneInput.addEventListener("input", function () {
    localStorage.setItem(PHONE_KEY, phoneInput.value);
  });

  function isToday(d) {
    return d === today.getDate() && state.month === today.getMonth() && state.year === today.getFullYear();
  }

  function render() {
    document.getElementById("monthLabel").textContent = MONTH_NAMES_SW[state.month] + " " + state.year;

    // weekday row
    var wr = document.getElementById("weekdayRow");
    wr.innerHTML = "";
    WEEKDAYS_SHORT.forEach(function (w) {
      var el = document.createElement("div");
      el.className = "weekday-cell";
      el.textContent = w;
      wr.appendChild(el);
    });

    // grid
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    var totalDays = daysInMonth(state.year, state.month);
    var firstWeekday = new Date(state.year, state.month, 1).getDay();
    for (var i = 0; i < firstWeekday; i++) {
      var empty = document.createElement("div");
      empty.className = "empty-cell";
      grid.appendChild(empty);
    }
    for (var d = 1; d <= totalDays; d++) {
      (function (day) {
        var key = dateKey(state.year, state.month, day);
        var entry = state.entries[key];
        var shift = entry && entry.code ? CODE_MAP[entry.code] : null;
        var isQuickSelected = state.quickFillMode && state.quickFillDays.indexOf(day) !== -1;

        var cell = document.createElement("div");
        cell.className = "day-cell" + (isToday(day) ? " today" : "") + (isQuickSelected ? " quick-selected" : "");
        cell.style.borderColor = shift ? shift.color : "#E5E0D3";

        var num = document.createElement("div");
        num.className = "day-num";
        num.textContent = day;
        cell.appendChild(num);

        if (isQuickSelected) {
          var check = document.createElement("div");
          check.className = "quick-checkmark";
          check.textContent = "✓";
          cell.appendChild(check);
        }

        if (!state.quickFillMode && shift) {
          var chip = document.createElement("div");
          chip.className = "day-shift-chip";
          chip.style.background = shift.color;
          chip.textContent = shift.label;
          cell.appendChild(chip);
        }

        if (!state.quickFillMode && entry && entry.comment) {
          var dot = document.createElement("div");
          dot.className = "comment-dot";
          cell.appendChild(dot);
        }

        cell.addEventListener("click", function () { openDay(day); });
        grid.appendChild(cell);
      })(d);
    }

    // summary
    var monthPrefix = state.year + "-" + pad(state.month + 1) + "-";
    var counts = {};
    var hasAny = false;
    Object.keys(state.entries).forEach(function (k) {
      if (k.indexOf(monthPrefix) === 0 && state.entries[k].code) {
        counts[state.entries[k].code] = (counts[state.entries[k].code] || 0) + 1;
        hasAny = true;
      }
    });
    var sc = document.getElementById("summaryChips");
    sc.innerHTML = "";
    SHIFT_CODES.forEach(function (s) {
      if (counts[s.code]) {
        var chip = document.createElement("div");
        chip.className = "summary-chip";
        chip.style.borderColor = s.color;
        chip.innerHTML = '<span style="color:' + s.color + ';font-weight:700">' + s.label + '</span><span class="count">' + counts[s.code] + '</span>';
        sc.appendChild(chip);
      }
    });
    if (!hasAny) {
      var note = document.createElement("div");
      note.className = "empty-note";
      note.textContent = "Bado hakuna taarifa mwezi huu";
      sc.appendChild(note);
    }

    // legend
    var legend = document.getElementById("legend");
    legend.innerHTML = "";
    SHIFT_CODES.forEach(function (s) {
      var item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = '<span class="legend-dot" style="background:' + s.color + '"></span><span class="legend-label"><b>' + s.label + '</b> – ' + s.desc + '</span>';
      legend.appendChild(item);
    });

    // quickfill toggle state
    var qfToggle = document.getElementById("quickfillToggle");
    if (state.quickFillMode) {
      qfToggle.classList.add("active");
      qfToggle.textContent = "Quick Fill: chagua tarehe (" + state.quickFillDays.length + " zimechaguliwa)";
    } else {
      qfToggle.classList.remove("active");
      qfToggle.textContent = "Jaza tarehe nyingi mfululizo (Quick Fill)";
    }

    // quickfill bar
    var qfBar = document.getElementById("quickfillBar");
    if (state.quickFillMode && state.quickFillDays.length > 0) {
      qfBar.classList.add("show");
      document.getElementById("quickfillBarLabel").textContent = "Weka code kwa " + state.quickFillDays.length + " tarehe zilizochaguliwa:";
      var qfChips = document.getElementById("quickfillChips");
      qfChips.innerHTML = "";
      SHIFT_CODES.forEach(function (s) {
        var btn = document.createElement("button");
        btn.className = "pick-chip selected";
        btn.style.background = s.color;
        btn.style.borderColor = s.color;
        btn.textContent = s.label;
        btn.addEventListener("click", function () { applyQuickFill(s.code); });
        qfChips.appendChild(btn);
      });
      document.body.style.paddingBottom = "140px";
    } else {
      qfBar.classList.remove("show");
      document.body.style.paddingBottom = "";
    }
  }

  function openDay(day) {
    if (state.quickFillMode) {
      var idx = state.quickFillDays.indexOf(day);
      if (idx === -1) state.quickFillDays.push(day);
      else state.quickFillDays.splice(idx, 1);
      render();
      return;
    }
    state.selectedDay = day;
    var key = dateKey(state.year, state.month, day);
    var entry = state.entries[key];
    document.getElementById("sheetDate").textContent = pad(day) + " " + MONTH_NAMES_SW[state.month] + " " + state.year;
    document.getElementById("sheetWeekday").textContent = WEEKDAYS_SW[new Date(state.year, state.month, day).getDay()];
    document.getElementById("commentBox").value = (entry && entry.comment) || "";

    var dayChips = document.getElementById("dayChips");
    dayChips.innerHTML = "";
    SHIFT_CODES.forEach(function (s) {
      var selected = entry && entry.code === s.code;
      var btn = document.createElement("button");
      btn.className = "pick-chip" + (selected ? " selected" : "");
      btn.style.borderColor = s.color;
      btn.style.background = selected ? s.color : "#fff";
      btn.style.color = selected ? "#fff" : s.color;
      btn.textContent = s.label;
      btn.addEventListener("click", function () { setShift(s.code); });
      dayChips.appendChild(btn);
    });

    document.getElementById("daySheetOverlay").classList.add("show");
  }

  function closeDay() {
    state.selectedDay = null;
    document.getElementById("daySheetOverlay").classList.remove("show");
  }

  function setShift(code) {
    var key = dateKey(state.year, state.month, state.selectedDay);
    var existing = state.entries[key];
    state.entries[key] = { code: code, comment: existing ? existing.comment : "" };
    saveEntries(state.entries);
    openDay(state.selectedDay); // refresh sheet highlight
    render();
  }

  function saveAndClose() {
    var key = dateKey(state.year, state.month, state.selectedDay);
    var existing = state.entries[key];
    var comment = document.getElementById("commentBox").value;
    state.entries[key] = { code: existing ? existing.code : "", comment: comment };
    saveEntries(state.entries);
    closeDay();
    render();
  }

  function clearDay() {
    var key = dateKey(state.year, state.month, state.selectedDay);
    delete state.entries[key];
    saveEntries(state.entries);
    closeDay();
    render();
  }

  function toggleQuickFillMode() {
    state.quickFillMode = !state.quickFillMode;
    state.quickFillDays = [];
    state.selectedDay = null;
    render();
  }

  function applyQuickFill(code) {
    if (state.quickFillDays.length === 0) return;
    state.quickFillDays.forEach(function (day) {
      var key = dateKey(state.year, state.month, day);
      var existing = state.entries[key];
      state.entries[key] = { code: code, comment: existing ? existing.comment : "" };
    });
    saveEntries(state.entries);
    state.quickFillDays = [];
    state.quickFillMode = false;
    render();
  }

  function changeMonth(delta) {
    var m = state.month + delta;
    var y = state.year;
    if (m < 0) { m = 11; y -= 1; }
    else if (m > 11) { m = 0; y += 1; }
    state.month = m;
    state.year = y;
    state.selectedDay = null;
    render();
  }

  function buildRosterRows() {
    var totalDays = daysInMonth(state.year, state.month);
    var rows = [];
    for (var d = 1; d <= totalDays; d++) {
      var key = dateKey(state.year, state.month, d);
      var entry = state.entries[key];
      var wd = new Date(state.year, state.month, d).getDay();
      rows.push({
        date: pad(d) + "/" + pad(state.month + 1) + "/" + state.year,
        day: WEEKDAYS_SW[wd],
        code: entry && entry.code ? entry.code : "",
        desc: entry && entry.code && CODE_MAP[entry.code] ? CODE_MAP[entry.code].desc : "",
        comment: entry && entry.comment ? entry.comment : ""
      });
    }
    return rows;
  }

  function exportCSV() {
    var rows = buildRosterRows();
    var out = [["Tarehe", "Siku", "Shift", "Maelezo ya Shift", "Comment"]];
    rows.forEach(function (r) { out.push([r.date, r.day, r.code, r.desc, r.comment]); });
    var csv = out.map(function (r) {
      return r.map(function (c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(",");
    }).join("\n");
    var bom = "\uFEFF";
    var blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var ownerName = (ownerInput.value || "roster").replace(/\s+/g, "_");
    a.download = "Duty_Roster_" + ownerName + "_" + MONTH_NAMES_SW[state.month] + "_" + state.year + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    document.getElementById("exportOverlay").classList.remove("show");
  }

  function buildWorkbookBlob() {
    var rows = buildRosterRows();
    var name = ownerInput.value || "Jina la Mtumiaji";
    var phone = phoneInput.value || "";
    var monthLabel = MONTH_NAMES_SW[state.month] + " " + state.year;

    var wb = XLSX.utils.book_new();
    var aoa = [];

    // Heading block
    aoa.push(["MUHIMBILI ORTHOPAEDIC INSTITUTE (MOI)"]);
    aoa.push(["WARD 2B DUTY ROSTER"]);
    aoa.push([name]);
    if (phone) aoa.push(["Simu: " + phone]);
    aoa.push(["Mwezi: " + monthLabel]);
    aoa.push([]); // spacer row
    var headerRowIndex = aoa.length; // 0-indexed row where column headers sit
    aoa.push(["Tarehe", "Siku", "Shift", "Maelezo ya Shift", "Comment"]);
    var dataStartIndex = aoa.length;
    rows.forEach(function (r) {
      aoa.push([r.date, r.day, r.code, r.desc, r.comment]);
    });

    var ws = XLSX.utils.aoa_to_sheet(aoa);

    // Column widths - fit content
    ws["!cols"] = [
      { wch: 13 }, // Tarehe
      { wch: 12 }, // Siku
      { wch: 9 },  // Shift
      { wch: 34 }, // Maelezo
      { wch: 30 }  // Comment
    ];

    // Merge heading rows across columns A-E
    ws["!merges"] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 4 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: 4 } },
      { s: { r: 2, c: 0 }, e: { r: 2, c: 4 } },
    ];
    var nextMerge = 3;
    if (phone) { ws["!merges"].push({ s: { r: nextMerge, c: 0 }, e: { r: nextMerge, c: 4 } }); nextMerge++; }
    ws["!merges"].push({ s: { r: nextMerge, c: 0 }, e: { r: nextMerge, c: 4 } });

    // Styling helper
    function setCellStyle(addr, style) {
      if (!ws[addr]) ws[addr] = { t: "s", v: "" };
      ws[addr].s = style;
    }
    var thinBorder = { style: "thin", color: { rgb: "D8D2C4" } };
    var allBorders = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };

    // Title styles
    setCellStyle("A1", {
      font: { bold: true, sz: 15, color: { rgb: "FFFFFF" } },
      fill: { fgColor: { rgb: "20241F" } },
      alignment: { horizontal: "center", vertical: "center" }
    });
    setCellStyle("A2", {
      font: { bold: true, sz: 13, color: { rgb: "FFFFFF" } },
      fill: { fgColor: { rgb: "2F6F5E" } },
      alignment: { horizontal: "center", vertical: "center" }
    });
    setCellStyle("A3", {
      font: { bold: true, sz: 12, color: { rgb: "20241F" } },
      fill: { fgColor: { rgb: "E4EEE9" } },
      alignment: { horizontal: "center", vertical: "center" }
    });
    var rowCursor = 3;
    if (phone) {
      setCellStyle("A" + (rowCursor + 1), {
        font: { sz: 11, color: { rgb: "5B5648" } },
        fill: { fgColor: { rgb: "F7F4EC" } },
        alignment: { horizontal: "center", vertical: "center" }
      });
      rowCursor++;
    }
    setCellStyle("A" + (rowCursor + 1), {
      font: { italic: true, sz: 11, color: { rgb: "5B5648" } },
      fill: { fgColor: { rgb: "F7F4EC" } },
      alignment: { horizontal: "center", vertical: "center" }
    });

    // Column header row styling (header_row is 0-indexed -> +1 for cell address)
    var colLetters = ["A", "B", "C", "D", "E"];
    colLetters.forEach(function (col) {
      setCellStyle(col + (headerRowIndex + 1), {
        font: { bold: true, sz: 11, color: { rgb: "FFFFFF" } },
        fill: { fgColor: { rgb: "20241F" } },
        alignment: { horizontal: "center", vertical: "center" },
        border: allBorders
      });
    });

    // Shift color map for data rows
    var shiftFill = {
      "7-5": "DCEEE7",
      "N": "DCE2F0",
      "SD": "E9E0F0",
      "DO": "EDEBE6",
      "L": "F5DFDA",
      "PH": "F7E9CE",
      "DYS": "F2DDE4"
    };

    rows.forEach(function (r, idx) {
      var rowNum = dataStartIndex + idx + 1; // 1-indexed for cell address
      var isWeekend = false;
      var wdIdx = WEEKDAYS_SW.indexOf(r.day);
      if (wdIdx === 0 || wdIdx === 6) isWeekend = true;
      var baseFill = isWeekend ? "F7F4EC" : "FFFFFF";

      colLetters.forEach(function (col, colIdx) {
        var fill = baseFill;
        if (col === "C" && r.code && shiftFill[r.code]) fill = shiftFill[r.code];
        setCellStyle(col + rowNum, {
          font: { sz: 10.5, bold: col === "C", color: { rgb: "20241F" } },
          fill: { fgColor: { rgb: fill } },
          alignment: { horizontal: colIdx === 0 || colIdx === 1 || colIdx === 2 ? "center" : "left", vertical: "center", wrapText: true },
          border: allBorders
        });
      });
    });

    // Row heights
    ws["!rows"] = [];
    ws["!rows"][0] = { hpt: 22 };
    ws["!rows"][1] = { hpt: 20 };
    ws["!rows"][2] = { hpt: 18 };

    XLSX.utils.book_append_sheet(wb, ws, "Roster");
    var wbout = XLSX.write(wb, { bookType: "xlsx", type: "array", cellStyles: true });
    return new Blob([wbout], { type: "application/octet-stream" });
  }

  function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function exportXLSX() {
    var blob = buildWorkbookBlob();
    var ownerName = (ownerInput.value || "roster").replace(/\s+/g, "_");
    downloadBlob(blob, "Duty_Roster_" + ownerName + "_" + MONTH_NAMES_SW[state.month] + "_" + state.year + ".xlsx");
    document.getElementById("exportOverlay").classList.remove("show");
  }

  async function shareToWhatsApp() {
    var blob = buildWorkbookBlob();
    var ownerName = (ownerInput.value || "roster").replace(/\s+/g, "_");
    var filename = "Duty_Roster_" + ownerName + "_" + MONTH_NAMES_SW[state.month] + "_" + state.year + ".xlsx";
    var file = new File([blob], filename, { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Duty Roster " + MONTH_NAMES_SW[state.month] + " " + state.year,
          text: "Ratiba ya zamu - " + MONTH_NAMES_SW[state.month] + " " + state.year
        });
        document.getElementById("exportOverlay").classList.remove("show");
        return;
      } catch (e) {
        // user cancelled or share failed - fall through to download
      }
    }
    // Fallback: just download the file and inform user
    downloadBlob(blob, filename);
    alert("Simu yako haitumii 'Share' moja kwa moja. Faili limepakuliwa - unaweza kulituma WhatsApp kwa mkono kutoka Downloads.");
    document.getElementById("exportOverlay").classList.remove("show");
  }

  // Event bindings
  document.getElementById("prevMonth").addEventListener("click", function () { changeMonth(-1); });
  document.getElementById("nextMonth").addEventListener("click", function () { changeMonth(1); });
  document.getElementById("quickfillToggle").addEventListener("click", toggleQuickFillMode);
  document.getElementById("closeDayBtn").addEventListener("click", closeDay);
  document.getElementById("daySheetOverlay").addEventListener("click", function (e) {
    if (e.target === this) closeDay();
  });
  document.getElementById("saveCommentBtn").addEventListener("click", saveAndClose);
  document.getElementById("clearDayBtn").addEventListener("click", clearDay);
  document.getElementById("exportOpenBtn").addEventListener("click", function () {
    document.getElementById("exportTitle").textContent = "Export " + MONTH_NAMES_SW[state.month] + " " + state.year;
    document.getElementById("exportOverlay").classList.add("show");
  });
  document.getElementById("exportOverlay").addEventListener("click", function (e) {
    if (e.target === this) this.classList.remove("show");
  });
  document.getElementById("exportCancelBtn").addEventListener("click", function () {
    document.getElementById("exportOverlay").classList.remove("show");
  });
  document.getElementById("exportXlsxBtn").addEventListener("click", exportXLSX);
  document.getElementById("exportCsvBtn").addEventListener("click", exportCSV);
  document.getElementById("exportShareBtn").addEventListener("click", shareToWhatsApp);

  render();

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  }
})();
</script>
</body>
</html>
